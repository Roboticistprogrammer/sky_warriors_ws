# PX4 Failsafe Parameters Configuration
# Apply these parameters for comprehensive failsafe testing

# General Safety Settings
safety:
  COM_FAIL_ACT_T: 5.0          # Failure detection time (seconds)
  
# GPS Failsafe
gps_failsafe:
  COM_POS_FS_DELAY: 1.0        # Position failsafe delay (seconds)
  COM_POS_FS_EPH: 5.0          # Horizontal position error threshold (m)
  COM_POS_FS_EPV: 10.0         # Vertical position error threshold (m)
  COM_POS_FS_GAIN: 10.0        # Position failsafe gain timeout
  COM_POS_FS_PROB: 30          # Required position probabilities (%)

# Battery Failsafe  
battery_failsafe:
  BAT_CRIT_THR: 0.07           # Critical battery (7%)
  BAT_LOW_THR: 0.15            # Low battery warning (15%)
  BAT_EMERGEN_THR: 0.05        # Emergency threshold (5%)
  COM_LOW_BAT_ACT: 1           # Action: 0=Warning, 1=RTL, 2=Land, 3=Warning+RTL

# RC Loss Failsafe
rc_loss_failsafe:
  COM_RC_LOSS_T: 0.5           # RC loss timeout (seconds)
  NAV_RCL_ACT: 2               # RC loss action: 0=Disabled, 1=Hold, 2=RTL, 3=Land
  COM_RCL_EXCEPT: 4            # Bitmask: modes that can continue without RC
                               # 0=None, 1=Hold, 2=Offboard, 4=Mission

# Datalink Loss Failsafe
datalink_failsafe:
  COM_DL_LOSS_T: 10            # Datalink loss timeout (seconds)
  NAV_DLL_ACT: 0               # Datalink loss action: 0=Disabled, 1=Hold, 2=RTL, 3=Land
  COM_DL_REG_T: 0              # Datalink regain timeout

# Geofence
geofence:
  GF_ACTION: 1                 # 0=None, 1=Warning, 2=Hold, 3=RTL, 4=Terminate, 5=Land
  GF_ALTMODE: 0                # 0=WGS84, 1=AMSL
  GF_COUNT: -1                 # Geofence counter limit
  GF_MAX_HOR_DIST: 100.0       # Max horizontal distance (m)
  GF_MAX_VER_DIST: 50.0        # Max vertical distance (m)

# Return to Launch (RTL) Settings
rtl_settings:
  RTL_RETURN_ALT: 30.0         # RTL altitude (m)
  RTL_DESCEND_ALT: 10.0        # Descent altitude (m)  
  RTL_LAND_DELAY: 0.0          # Hover time before landing (s)
  RTL_TYPE: 0                  # 0=Return to launch, 1=Return to rally point

# Emergency/Parachute
emergency:
  COM_PARACHUTE: 0             # Parachute deployment: 0=Disabled, 1=Enabled

# System Failure Detection
failure_detection:
  SYS_FAILURE_EN: 1            # Enable failure injection (SITL only)
  FD_FAIL_P: 60                # Failure detector pitch threshold (deg)
  FD_FAIL_R: 60                # Failure detector roll threshold (deg)
  FD_FAIL_P_TTRI: 0.3          # Pitch failure trigger time (s)
  FD_FAIL_R_TTRI: 0.3          # Roll failure trigger time (s)

# How to Apply:
# =============
# Method 1: QGroundControl
#   Parameters -> search for parameter name -> modify value
#
# Method 2: PX4 Console  
#   Open PX4 shell: 
#   cd ~/PX4-Autopilot
#   ./build/px4_sitl_default/bin/px4 -i 0
#   
#   Then run:
#   param set PARAM_NAME VALUE
#   param save
#
# Method 3: Via MAVLink (Python script)
#   See: scripts/apply_failsafe_params.py
